<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM · Revora</title>
  <link rel="icon" href="/favicon.png">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg:       #0D0D14;
      --surface:  #16161F;
      --surface2: #1E1E2A;
      --border:   #2A2A38;
      --primary:  #7C3AED;
      --text:     #F0F0F6;
      --muted:    #8888A8;
      --danger:   #EF4444;
      --c-lead:        #818CF8;
      --c-fup:         #FBBF24;
      --c-agendado:    #34D399;
      --c-negociacao:  #60A5FA;
      --c-venda:       #4ADE80;
      --c-perdido:     #F87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ───────────────────────────────── LOGIN ───────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #1a0a3a 0%, var(--bg) 70%);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand img { width: 40px; height: 40px; border-radius: 8px; }
    .login-brand-name { font-size: 18px; font-weight: 700; color: var(--text); }
    .login-brand-sub  { font-size: 12px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }

    .login-heading { font-size: 26px; font-weight: 700; margin-bottom: 28px; }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .03em;
    }
    .req { color: var(--primary); }

    .input-wrap { position: relative; }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--muted); opacity: .6; }

    .toggle-pass {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      opacity: .5; transition: opacity .2s;
    }
    .toggle-pass:hover { opacity: 1; }

    .login-error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      transition: background .2s, opacity .2s;
    }
    .btn-login:hover { background: #6D28D9; }
    .btn-login:active { opacity: .85; }

    /* ───────────────────────────────── CRM ─────────────────────── */
    #crmScreen {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .crm-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .header-logo { width: 28px; height: 28px; border-radius: 6px; }
    .header-title { font-size: 16px; font-weight: 700; white-space: nowrap; }
    .header-tag {
      background: rgba(124,58,237,.25);
      border: 1px solid rgba(124,58,237,.4);
      border-radius: 4px;
      color: #a78bfa;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 2px 6px;
      text-transform: uppercase;
      margin-left: 6px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 340px;
    }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
      opacity: .5;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px 7px 30px;
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: var(--muted); opacity: .5; }

    .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    .stats-pill {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    .btn-new {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-new:hover { background: #6D28D9; }

    .btn-logout {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 6px 10px;
      transition: color .2s, border-color .2s;
    }
    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    /* Board */
    .board-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 20px 24px;
    }
    .board {
      display: flex;
      gap: 14px;
      height: 100%;
      min-width: max-content;
    }

    /* Column */
    .column {
      width: 288px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .15s;
      flex-shrink: 0;
    }
    .column.drag-over { background: var(--surface2); border-color: var(--primary); }

    .col-header {
      border-top: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
      flex-shrink: 0;
    }
    .col-title-wrap { display: flex; align-items: center; gap: 8px; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-size: 13px; font-weight: 700; letter-spacing: .02em; }
    .col-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      min-width: 22px;
      text-align: center;
    }
    .col-add {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 6px;
      transition: color .2s, border-color .2s;
    }
    .col-add:hover { color: var(--text); border-color: var(--muted); }

    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .col-empty {
      color: var(--muted);
      font-size: 12px;
      padding: 16px 8px;
      text-align: center;
      opacity: .6;
    }

    /* Card */
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      padding: 12px;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .card.dragging { opacity: .5; transform: rotate(1deg); }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .card-avatar {
      align-items: center;
      border-radius: 8px;
      display: flex;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 700;
      height: 36px;
      justify-content: center;
      width: 36px;
    }
    .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; word-break: break-word; }
    .card-phone { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .card-email { color: var(--muted); font-size: 11px; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-notes {
      background: rgba(255,255,255,.04);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      margin-bottom: 8px;
      padding: 6px 8px;
    }
    .card-date { color: var(--muted); font-size: 11px; opacity: .6; }

    /* ───────────────────────────────── MODAL ────────────────────── */
    .modal-overlay {
      align-items: center;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      bottom: 0; left: 0; right: 0; top: 0;
      display: flex;
      justify-content: center;
      padding: 20px;
      position: fixed;
      z-index: 100;
    }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 40px 80px rgba(0,0,0,.6);
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 32px;
      width: 100%;
      max-width: 480px;
      animation: fadeUp .25s ease;
    }

    .modal-head {
      align-items: center;
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-heading { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-textarea {
      min-height: 90px;
      resize: vertical;
    }
    select.form-input { cursor: pointer; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 20px;
      transition: color .2s;
    }
    .btn-cancel:hover { color: var(--text); }

    .btn-save {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 24px;
      transition: background .2s;
    }
    .btn-save:hover { background: #6D28D9; }

    .btn-delete {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      color: #fca5a5;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-right: auto;
      padding: 9px 20px;
      transition: background .2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,.2); }

    /* ───────────────────────────────── TOAST ────────────────────── */
    #toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      bottom: 24px; right: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 18px;
      position: fixed;
      transform: translateY(80px);
      transition: transform .3s;
      z-index: 200;
    }
    #toast.show { transform: translateY(0); }

    /* Scrollbar on board */
    .board-wrap::-webkit-scrollbar { height: 6px; }
    .board-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .modal-card { padding: 20px; }
      .login-card { padding: 28px 24px; }
      .crm-header { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- ────────────── LOGIN ────────────── -->
<section id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <img src="/favicon.png" alt="Revora">
      <div>
        <div class="login-brand-name">Revora</div>
        <div class="login-brand-sub">CRM Interno</div>
      </div>
    </div>
    <h1 class="login-heading">Entrar</h1>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" id="togglePassBtn">👁</button>
        </div>
      </div>
      <div id="loginError" class="login-error" style="display:none"></div>
      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
    </form>
  </div>
</section>

<!-- ────────────── CRM ────────────── -->
<section id="crmScreen" style="display:none">

  <header class="crm-header">
    <img src="/favicon.png" class="header-logo" alt="">
    <span class="header-title">CRM <span class="header-tag">Interno</span></span>
    <div class="search-wrap" style="margin-left:16px">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nome, telefone...">
    </div>
    <div class="header-right">
      <span class="stats-pill" id="statsPill">0 leads</span>
      <button class="btn-new" onclick="openModal(null)">+ Novo Lead</button>
      <button class="btn-logout" title="Sair" onclick="logout()">⏻</button>
    </div>
  </header>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

</section>

<!-- ────────────── MODAL ────────────── -->
<div id="modalOverlay" class="modal-overlay" style="display:none">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 class="modal-heading" id="modalHeading">Novo Lead</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form id="leadForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome <span class="req">*</span></label>
          <input class="form-input" type="text" id="fName" placeholder="João Silva" required>
        </div>
        <div class="form-group">
          <label class="form-label">Telefone <span class="req">*</span></label>
          <input class="form-input" type="tel" id="fPhone" placeholder="+55 11 99999-9999" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="fEmail" placeholder="cliente@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Etapa</label>
        <select class="form-input" id="fColumn">
          <option value="lead">Lead</option>
          <option value="fup">FUPs</option>
          <option value="agendado">Agendado</option>
          <option value="negociacao">Negociação</option>
          <option value="venda">Venda</option>
          <option value="perdido">Perdido</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea class="form-input form-textarea" id="fNotes" placeholder="Observações sobre o lead..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-delete" id="btnDelete" style="display:none" onclick="deleteLead()">Excluir</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn-save" id="btnSave">Adicionar</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const _U = 'pauloeduardopereiraa@gmail.com';
const _P = 'Pe1910!!';
const SESSION_KEY  = 'rv_crm_s';
const DATA_KEY     = 'rv_crm_d';
const INCOMING_KEY = 'rv_crm_in';

const COLS = [
  { id: 'lead',       label: 'Lead',       color: '#818CF8' },
  { id: 'fup',        label: 'FUPs',       color: '#FBBF24' },
  { id: 'agendado',   label: 'Agendado',   color: '#34D399' },
  { id: 'negociacao', label: 'Negociação', color: '#60A5FA' },
  { id: 'venda',      label: 'Venda',      color: '#4ADE80' },
  { id: 'perdido',    label: 'Perdido',    color: '#F87171' },
];

// ============================================================
// AUTH
// ============================================================
function isAuth() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    return s && s.ok && s.exp > Date.now();
  } catch { return false; }
}
function setAuth() {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ ok: true, exp: Date.now() + 28800000 }));
}
function logout() {
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('crmScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('loginPassword').value = '';
}

document.getElementById('togglePassBtn').onclick = function() {
  const inp = document.getElementById('loginPassword');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  this.textContent = show ? '🙈' : '👁';
};

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const em = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (em === _U && pw === _P) {
    setAuth();
    initCRM();
  } else {
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display = '';
    btn.disabled = true;
    btn.textContent = 'Aguarde...';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Entrar';
      err.style.display = 'none';
    }, 2000);
  }
});

// ============================================================
// DATA
// ============================================================
let leads = [];

function loadLeads() {
  try { leads = JSON.parse(localStorage.getItem(DATA_KEY)) || []; }
  catch { leads = []; }
}

function saveLeads() {
  localStorage.setItem(DATA_KEY, JSON.stringify(leads));
}

function absorbIncoming() {
  try {
    const raw = localStorage.getItem(INCOMING_KEY);
    if (!raw) return 0;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || !arr.length) return 0;
    let added = 0;
    arr.forEach(item => {
      const phone = (item.phone || item.telefone || '').trim();
      const email = (item.email || '').trim();
      const already = leads.some(l => (phone && l.phone === phone) || (email && l.email === email));
      if (!already) {
        leads.unshift({
          id: uid(),
          name:  (item.name || item.nome || '').trim(),
          email: email,
          phone: phone,
          notes: '',
          column: 'lead',
          createdAt: item.ts || Date.now(),
          updatedAt: Date.now()
        });
        added++;
      }
    });
    if (added) saveLeads();
    localStorage.removeItem(INCOMING_KEY);
    return added;
  } catch { return 0; }
}

function uid() {
  return 'l_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ============================================================
// RENDER
// ============================================================
let query = '';
let dragId = null;

function filtered(colId) {
  return leads.filter(l => {
    if (l.column !== colId) return false;
    if (!query) return true;
    const q = query.toLowerCase();
    return [l.name, l.email, l.phone, l.notes].join(' ').toLowerCase().includes(q);
  });
}

function initials(name) {
  if (!name) return '?';
  const w = name.trim().split(/\s+/);
  return w.length >= 2 ? (w[0][0] + w[1][0]).toUpperCase() : name[0].toUpperCase();
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  const m = Math.floor(d / 60000);
  if (m < 1)  return 'Agora há pouco';
  if (m < 60) return `${m}min atrás`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h atrás`;
  const days = Math.floor(h / 24);
  if (days === 1) return 'Ontem';
  if (days < 30)  return `${days} dias atrás`;
  const mo = Math.floor(days / 30);
  return `${mo} mês${mo > 1 ? 'es' : ''} atrás`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLS.forEach(col => {
    const items = filtered(col.id);

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;

    colEl.addEventListener('dragover', e => {
      e.preventDefault();
      colEl.classList.add('drag-over');
    });
    colEl.addEventListener('dragleave', e => {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
    });
    colEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');
      if (!dragId) return;
      const lead = leads.find(l => l.id === dragId);
      if (lead && lead.column !== col.id) {
        lead.column = col.id;
        lead.updatedAt = Date.now();
        saveLeads();
        renderBoard();
        toast(`Movido para ${col.label}`);
      }
      dragId = null;
    });

    const count = leads.filter(l => l.column === col.id).length;

    const header = document.createElement('div');
    header.className = 'col-header';
    header.style.borderTopColor = col.color;
    header.innerHTML = `
      <div class="col-title-wrap">
        <span class="col-dot" style="background:${col.color}"></span>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${count}</span>
      </div>
      <button class="col-add" title="Adicionar" onclick="openModal('${col.id}')">＋</button>
    `;

    const body = document.createElement('div');
    body.className = 'col-body';

    if (items.length === 0) {
      body.innerHTML = `<div class="col-empty">Nenhum lead aqui</div>`;
    } else {
      items.forEach(lead => body.appendChild(buildCard(lead, col.color)));
    }

    colEl.appendChild(header);
    colEl.appendChild(body);
    board.appendChild(colEl);
  });

  document.getElementById('statsPill').textContent =
    `${leads.length} lead${leads.length !== 1 ? 's' : ''}`;
}

function buildCard(lead, color) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.style.borderLeftColor = color;
  el.dataset.id = lead.id;

  el.addEventListener('dragstart', () => {
    dragId = lead.id;
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragId = null;
  });
  el.addEventListener('click', () => openModal(lead.column, lead.id));

  const avatarBg = color + '22';
  el.innerHTML = `
    <div class="card-top">
      <div class="card-avatar" style="background:${avatarBg};color:${color}">${initials(lead.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="card-name">${esc(lead.name)}</div>
        ${lead.phone ? `<div class="card-phone">📱 ${esc(lead.phone)}</div>` : ''}
      </div>
    </div>
    ${lead.email ? `<div class="card-email">✉️ ${esc(lead.email)}</div>` : ''}
    ${lead.notes ? `<div class="card-notes">${esc(lead.notes.slice(0,100))}${lead.notes.length > 100 ? '…' : ''}</div>` : ''}
    <div class="card-date">${timeAgo(lead.createdAt)}</div>
  `;
  return el;
}

// ============================================================
// MODAL
// ============================================================
let editId = null;

function openModal(colId, leadId) {
  editId = leadId || null;
  const overlay = document.getElementById('modalOverlay');
  const heading = document.getElementById('modalHeading');
  const delBtn  = document.getElementById('btnDelete');
  const saveBtn = document.getElementById('btnSave');

  // reset
  document.getElementById('fName').value   = '';
  document.getElementById('fEmail').value  = '';
  document.getElementById('fPhone').value  = '';
  document.getElementById('fNotes').value  = '';
  document.getElementById('fColumn').value = colId || 'lead';

  if (leadId) {
    const l = leads.find(x => x.id === leadId);
    if (!l) return;
    heading.textContent = 'Editar Lead';
    saveBtn.textContent = 'Salvar';
    delBtn.style.display = '';
    document.getElementById('fName').value   = l.name;
    document.getElementById('fEmail').value  = l.email;
    document.getElementById('fPhone').value  = l.phone;
    document.getElementById('fNotes').value  = l.notes || '';
    document.getElementById('fColumn').value = l.column;
  } else {
    heading.textContent = 'Novo Lead';
    saveBtn.textContent = 'Adicionar';
    delBtn.style.display = 'none';
  }

  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editId = null;
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('leadForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const name   = document.getElementById('fName').value.trim();
  const email  = document.getElementById('fEmail').value.trim();
  const phone  = document.getElementById('fPhone').value.trim();
  const notes  = document.getElementById('fNotes').value.trim();
  const column = document.getElementById('fColumn').value;

  if (editId) {
    const l = leads.find(x => x.id === editId);
    if (l) Object.assign(l, { name, email, phone, notes, column, updatedAt: Date.now() });
    toast('Lead atualizado ✓');
  } else {
    leads.unshift({ id: uid(), name, email, phone, notes, column, createdAt: Date.now(), updatedAt: Date.now() });
    toast('Lead adicionado ✓');
  }

  saveLeads();
  closeModal();
  renderBoard();
});

function deleteLead() {
  if (!editId) return;
  if (!confirm('Excluir este lead permanentemente?')) return;
  leads = leads.filter(l => l.id !== editId);
  saveLeads();
  closeModal();
  renderBoard();
  toast('Lead excluído');
}

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  query = this.value.trim();
  renderBoard();
});

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// INIT
// ============================================================
function initCRM() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('crmScreen').style.display = '';
  loadLeads();
  const n = absorbIncoming();
  renderBoard();
  if (n > 0) toast(`${n} novo${n > 1 ? 's' : ''} lead${n > 1 ? 's' : ''} importado${n > 1 ? 's' : ''} ✓`);
}

// Auto-login se sessão ainda válida
if (isAuth()) initCRM();
</script>
